# sqlc configuration for PeopleVault backend.
# Generates type-safe Go code from SQL queries in db/queries.
version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries"
    schema: "db/migrations"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/sqlc"
        emit_json_tags: true
        emit_interface: true
        emit_pointers_for_null_types: true
        sql_package: "pgx/v5"

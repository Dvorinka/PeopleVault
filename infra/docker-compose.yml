# Default stack — no cache layer. Simplest local setup.
# For caching (DragonflyDB), use the override:
#   docker compose -f docker-compose.yml -f docker-compose.dragonfly.yml up --build
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-peoplevault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-peoplevault_dev}
      POSTGRES_DB: ${POSTGRES_DB:-peoplevault}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-peoplevault}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      # DRAGONFLY_ADDR empty = no cache, backend runs without it
      DRAGONFLY_ADDR: ${DRAGONFLY_ADDR:-}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8081
    ports:
      - "5173:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
